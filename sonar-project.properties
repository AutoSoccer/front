sonar.projectKey=AutoSoccer_front
sonar.organization=autosoccer

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx

# Exclusoes alinhadas com vitest.config.ts coverage.include:
# - src/app/**: pages Next.js (RSC + client). Cobertas via E2E (follow-up).
# - src/i18n/**: arquivos de traducao + config (JSON declarativo).
# - src/types/**: type definitions (sem runtime).
# - src/configs/**, src/store/**, src/layouts/**, src/views/**, src/mocks/**,
#   src/utils/**: ausentes do escopo do vitest, sem testes unitarios.
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/node_modules/**,**/.next/**,**/coverage/**,**/__tests__/**,src/app/**,src/i18n/**,src/types/**,src/configs/**,src/store/**,src/layouts/**,src/views/**,src/mocks/**,src/utils/**

# sonar.typescript.lcov.reportPaths foi deprecado em 2023 —
# sonar.javascript.lcov.reportPaths cobre TS tambem.
sonar.javascript.lcov.reportPaths=coverage/lcov.info

sonar.sourceEncoding=UTF-8
