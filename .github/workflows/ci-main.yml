name: CI - main (staging)

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint, typecheck, test:coverage, build, sonar
    runs-on: ubuntu-latest
    permissions:
      contents: read

    # NEXT_PUBLIC_API_URL e usado por src/providers/api.ts. Em build sem a
    # var, ainda funciona via fallback ("http://localhost:3333"), mas
    # definir explicitamente evita warnings durante o `next build` e
    # mantem o build do CI alinhado com producao (Vercel).
    env:
      NEXT_PUBLIC_API_URL: https://autosoccer-api-production.up.railway.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Sonar precisa do histórico completo para blame
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        id: install
        continue-on-error: true
        run: npm ci

      - name: Lint
        id: lint
        continue-on-error: true
        run: npm run lint

      - name: Typecheck
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit

      - name: i18n parity check
        id: i18n
        continue-on-error: true
        run: npm run i18n:check

      - name: Test with coverage
        id: test
        continue-on-error: true
        run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=html --coverage.reporter=lcov --coverage.reporter=json-summary

      - name: Next.js build
        id: build
        continue-on-error: true
        run: npm run build

      - name: Step outcomes (diagnostico)
        if: always()
        run: |
          echo "=== Outcomes ==="
          echo "install:   ${{ steps.install.outcome }}"
          echo "lint:      ${{ steps.lint.outcome }}"
          echo "typecheck: ${{ steps.typecheck.outcome }}"
          echo "i18n:      ${{ steps.i18n.outcome }}"
          echo "test:      ${{ steps.test.outcome }}"
          echo "build:     ${{ steps.build.outcome }}"
          {
            echo "## CI step outcomes"
            echo ""
            echo "| Step | Outcome |"
            echo "| --- | --- |"
            echo "| install | ${{ steps.install.outcome }} |"
            echo "| lint | ${{ steps.lint.outcome }} |"
            echo "| typecheck | ${{ steps.typecheck.outcome }} |"
            echo "| i18n | ${{ steps.i18n.outcome }} |"
            echo "| test:coverage | ${{ steps.test.outcome }} |"
            echo "| build | ${{ steps.build.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Fail job if any hard gate failed
        if: always() && (steps.install.outcome == 'failure' || steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.i18n.outcome == 'failure' || steps.test.outcome == 'failure' || steps.build.outcome == 'failure')
        run: |
          echo "::error::Pelo menos um hard gate falhou (ver tabela de outcomes acima)"
          exit 1

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: front-coverage-main-${{ github.sha }}
          path: coverage/
          retention-days: 30

      # SonarCloud e opcional: nao queremos quebrar o pipeline (testes +
      # lint + typecheck + build) se o Sonar estiver com config divergente
      # do projectKey. Os erros viram aviso no summary do run.
      #
      # A action SonarSource/sonarcloud-github-action foi deprecada em 2025
      # — agora a recomendada e sonarqube-scan-action@v5, que funciona
      # tanto para SonarQube Server quanto SonarCloud.
      - name: SonarCloud Scan
        if: success()
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Note about deploy
        if: always()
        run: |
          {
            echo "## Deploy info"
            echo ""
            echo "O deploy de produção é feito automaticamente pela **Vercel** ao detectar push em \`main\`."
            echo "Não há step explícito de deploy aqui — ver \`.github/workflows/README.md\`."
          } >> "$GITHUB_STEP_SUMMARY"
