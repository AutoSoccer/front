name: CI - Pull Request

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint, typecheck, test:coverage, build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    # Mesma logica do ci-main: definir explicitamente para silenciar
    # warnings de `next build` quando NEXT_PUBLIC_API_URL nao existe.
    env:
      NEXT_PUBLIC_API_URL: https://autosoccer-api-production.up.railway.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: i18n parity check
        run: npm run i18n:check

      - name: Test with coverage
        run: npm run test:coverage -- --coverage.reporter=text --coverage.reporter=html --coverage.reporter=lcov --coverage.reporter=json-summary

      - name: Next.js build
        run: npm run build

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: front-coverage-pr-${{ github.event.pull_request.number }}
          path: coverage/
          retention-days: 14

      - name: Extract coverage summary
        if: always()
        id: coverage
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            LINES=$(node -p "require('./coverage/coverage-summary.json').total.lines.pct")
            BRANCHES=$(node -p "require('./coverage/coverage-summary.json').total.branches.pct")
            FUNCTIONS=$(node -p "require('./coverage/coverage-summary.json').total.functions.pct")
            STATEMENTS=$(node -p "require('./coverage/coverage-summary.json').total.statements.pct")
          else
            LINES="n/a"; BRANCHES="n/a"; FUNCTIONS="n/a"; STATEMENTS="n/a"
          fi
          {
            echo "lines=$LINES"
            echo "branches=$BRANCHES"
            echo "functions=$FUNCTIONS"
            echo "statements=$STATEMENTS"
          } >> "$GITHUB_OUTPUT"

      - name: Comment coverage on PR
        if: always() && github.event.pull_request != null
        uses: actions/github-script@v7
        with:
          script: |
            const lines = '${{ steps.coverage.outputs.lines }}';
            const branches = '${{ steps.coverage.outputs.branches }}';
            const functions = '${{ steps.coverage.outputs.functions }}';
            const statements = '${{ steps.coverage.outputs.statements }}';
            const body = [
              '### AutoSoccer Front â€” Coverage report',
              '',
              '| Metric | % |',
              '| --- | --- |',
              `| Lines | ${lines} |`,
              `| Branches | ${branches} |`,
              `| Functions | ${functions} |`,
              `| Statements | ${statements} |`,
              '',
              `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
